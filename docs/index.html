<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castles and Cannons</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <h1>Castles and Cannons</h1>
    <p class="subtitle">Classroom Points</p>
  </header>

  <main class="layout">
    <aside class="students-panel" aria-label="Student list">
      <h2>Students</h2>
      <ul id="studentList" class="student-list"></ul>
    </aside>

    <section class="quiz-panel" aria-label="English quiz">
      <div class="selector-row">
        <label for="studentSelect">Current student:</label>
        <select id="studentSelect" aria-label="Select student"></select>
      </div>

      <h2>English Quiz</h2>
      <div id="quizContainer"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
