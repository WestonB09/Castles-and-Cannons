<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Castles and Cannons</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <header>
      <h1>Castles and Cannons</h1>
      <p class="subtitle">Classroom Points</p>
    </header>

    <section class="students" aria-label="Students and scores">
      <article class="card"><h2>Ryan</h2><p>Score: <strong>0</strong></p></article>
      <article class="card"><h2>Joseph</h2><p>Score: <strong>0</strong></p></article>
      <article class="card"><h2>Mary</h2><p>Score: <strong>0</strong></p></article>
      <article class="card"><h2>Ella</h2><p>Score: <strong>0</strong></p></article>
    </section>

    <section class="questions" aria-label="English questions">
      <h2>English Questions</h2>
      <ol>
        <li>What did you do after school yesterday?</li>
        <li>Can you describe your favorite place using three adjectives?</li>
        <li>Write one sentence using "because" to explain a choice.</li>
      </ol>
    </section>
  </main>
</body>
</html>
